name: Auto-Fix JSON Trailing Commas

on:
  push:
    branches: [ main ]

jobs:
  fix-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Fixer Script
      run: |
        python -c "
        import re, glob
        for file in glob.glob('**/*.json', recursive=True):
            with open(file, 'r', encoding='utf-8') as f:
                content = f.read()
            # Strips trailing commas before closing brackets or braces
            cleaned = re.sub(r',(\s*[\]}])', r'\1', content)
            with open(file, 'w', encoding='utf-8') as f:
                f.write(cleaned)
        "

    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-fix trailing commas in JSON data"
