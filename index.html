<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Multi-Stream Loop Matrix (Export Edition)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0b0b; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; overflow-x: hidden; }
        
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        }
        .config-card {
            background: #161616;
            border: 1px solid #2d2d2d;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { font-size: 24px; margin-bottom: 8px; color: #fff; text-align: center; }
        .subtitle { font-size: 13px; color: #777; text-align: center; margin-bottom: 24px; }
        
        .url-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
        .url-input {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            padding: 12px 16px;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .url-input:focus { border-color: #0095f6; }
        
        .btn {
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-add { background: #222; color: #0095f6; border: 1px solid #333; }
        .btn-add:hover { background: #2a2a2a; }
        .btn-remove { background: #331417; color: #ed4956; border: 1px solid #4a1a1e; }
        .btn-remove:hover { background: #441a1f; }
        
        .btn-launch { background: #0095f6; color: #fff; width: 100%; margin-top: 15px; font-size: 16px; padding: 14px; }
        .btn-launch:hover { background: #189ffa; }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 20px;
            margin-top: 12px;
        }
        .toggle-label { font-size: 14px; font-weight: bold; color: #ddd; }
        
        .search-wrapper { position: relative; max-width: 280px; width: 100%; }
        .search-input {
            width: 100%;
            background: #111;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #0095f6; }
        
        .search-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: #1c1c1c;
            border: 1px solid #333;
            border-radius: 8px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 999;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .search-item {
            padding: 10px 14px;
            font-size: 13px;
            color: #ddd;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            border-bottom: 1px solid #252525;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover, .search-item.selected { background: #0095f6; color: #fff; }
        .search-no-results { padding: 12px; font-size: 12px; color: #666; text-align: center; }

        /* ACTIVE DATABASE MANAGER PANEL */
        .db-editor-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            margin-top: 15px;
            padding: 15px;
            display: none;
        }
        .db-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .db-editor-title { font-size: 13px; font-weight: bold; color: #888; }
        .btn-export-db { background: #0095f6; color: white; padding: 4px 10px; font-size: 11px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-export-db:hover { background: #189ffa; }
        
        .db-scroll-box { max-height: 200px; overflow-y: auto; }
        .db-folder-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: #222; border-radius: 6px; margin-bottom: 6px; border: 1px solid #2d2d2d; }
        .db-folder-name { font-size: 12px; color: #eee; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 75%; }
        .btn-inline-delete { background: none; border: none; color: #ed4956; font-size: 11px; cursor: pointer; font-weight: bold; padding: 2px 6px; border-radius: 4px; }
        .btn-inline-delete:hover { background: #331417; }

        .file-input-wrapper {
            background: #1a1a1a;
            border: 1px dashed #333;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .file-input-wrapper:hover { border-color: #0095f6; background: #1e1e1e; }
        .file-input-wrapper input { display: none; }
        .file-label { font-size: 13px; color: #aaa; cursor: pointer; }
        .file-status { font-size: 11px; color: #0095f6; margin-top: 5px; font-weight: bold; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #0095f6; }
        input:checked + .slider:before { transform: translateX(24px); }

        .actions-bar { display: flex; justify-content: space-between; margin-top: 15px; }

        #loop-screen { display: none; }
        #feed { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; }
        
        .stream-panel { position: relative; width: 100%; background: #000; border-bottom: 2px solid #222; transition: height 0.2s ease; }
        .mode-landscape { height: 100vh; }
        .mode-portrait { height: 50vh; } 
        .post-iframe { width: 100%; height: 100%; border: none; display: block; }
        
        .hotswap-overlay {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 4px 8px;
            display: flex;
            gap: 6px;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateY(-5px);
            z-index: 10000;
            backdrop-filter: blur(8px);
            width: 360px;
        }
        .stream-panel:hover .hotswap-overlay { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hotswap-input { flex: 1; background: #1a1a1a; border: 1px solid #444; border-radius: 14px; padding: 4px 10px; color: #fff; font-size: 11px; outline: none; }
        .hotswap-input:focus { border-color: #0095f6; }
        
        .hotswap-btn { background: #0095f6; color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .hotswap-btn:hover { background: #189ffa; }
        
        .dice-btn { background: #ff9f0a; font-size: 12px; }
        .dice-btn:hover { background: #ffb340; }

        #controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 10px 18px; border-radius: 30px; z-index: 2147483647; display: flex; gap: 10px; align-items: center; color: white; border: 1px solid #333; backdrop-filter: blur(10px); white-space: nowrap; }
        #controls button { background: #222; border: 1px solid #444; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px; }
        #controls button#toggle { background: #0095f6; border: none; }
        #controls button#toggle.pause { background: #ed4956; }
        #controls button.nav-jump { background: #333; color: #fff; border-color: #555; }
        #controls button.btn-gear { background: #333; font-size: 14px; padding: 6px 10px; }
        #controls .info { color: #888; font-size: 13px; font-family: monospace; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="config-card">
        <h2>Stream Loop Launchpad</h2>
        <p class="subtitle">Map active URLs or shuffle paths directly via imported lists or bookmark trees.</p>
        
        <div id="url-fields-container"></div>

        <div class="actions-bar">
            <button class="btn btn-add" id="add-field-btn">+ Add Stream Row</button>
            <button class="btn btn-add dice-btn" id="roll-empty-btn">🎲 Fill Empty Slots</button>
            <button class="btn btn-remove" id="clear-cache-btn">Reset Grid</button>
        </div>

        <button class="btn btn-launch" id="launch-btn">🚀 LAUNCH MATRIX</button>

        <div class="toggle-container">
            <span class="toggle-label">📐 Optimize Layout for Portrait Monitor</span>
            <label class="switch">
                <input type="checkbox" id="portrait-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-container">
            <span class="toggle-label">📁 Active Shuffle Directory Pool</span>
            <div class="search-wrapper">
                <input type="text" id="folder-search-input" class="search-input" placeholder="Type to search folder..." autocomplete="off">
                <div id="search-dropdown-list" class="search-dropdown"></div>
            </div>
        </div>

        <div id="db-editor-panel" class="db-editor-panel">
            <div class="db-header-row">
                <div class="db-editor-title">🛠️ Active Folder Database Manager</div>
                <button class="btn-export-db" id="export-cleaned-btn">⬇️ Export Cleaned HTML</button>
            </div>
            <div id="db-editor-list" class="db-scroll-box"></div>
        </div>

        <div class="file-input-wrapper" onclick="document.getElementById('bookmark-files').click()">
            <span class="file-label" id="upload-prompt">📂 Drop or Upload ANY File Containing Links (.html, .txt, .csv)</span>
            <input type="file" id="bookmark-files" accept=".html,.txt,.csv" multiple>
            <div class="file-status" id="upload-status"></div>
        </div>
    </div>
</div>

<div id="loop-screen">
    <div id="feed"></div>
    <div id="controls">
        <button id="toggle">▶ PLAY</button>
        <button id="prev-page-btn" class="nav-jump">▲ UP</button>
        <button id="next-page-btn" class="nav-jump">▼ DN</button>
        <span class="info" id="status">0 streams</span>
        <span class="info">|</span>
        <button id="faster">+</button>
        <span class="info" id="speed-label">Speed: 1.00x</span>
        <button id="slower">-</button>
        <span class="info">|</span>
        <button class="btn-gear" id="edit-config-btn">⚙️</button>
    </div>
</div>

<script>
    let animationFrameId = null;
    let isScrolling = false;
    let scrollSpeed = parseFloat(localStorage.getItem('matrixScrollSpeed')) || 1.00;
    let targetUrls = [];
    let accurateYPosition = 0; 

    let parsedFoldersMap = {}; 
    let activeFolderLinks = [];

    const DEFAULT_URLS = ['https://example.com', 'https://example.com', 'https://example.com'];

    const setupScreen = document.getElementById('setup-screen');
    const loopScreen = document.getElementById('loop-screen');
    const feedContainer = document.getElementById('feed');
    const container = document.getElementById('url-fields-container');
    const portraitToggle = document.getElementById('portrait-mode-toggle');
    const fileInput = document.getElementById('bookmark-files');
    const uploadStatus = document.getElementById('upload-status');
    const searchInput = document.getElementById('folder-search-input');
    const searchDropdown = document.getElementById('search-dropdown-list');
    
    const dbEditorPanel = document.getElementById('db-editor-panel');
    const dbEditorList = document.getElementById('db-editor-list');

    function initLaunchpad() {
        try {
            const cached = localStorage.getItem('loop_matrix_urls');
            if (cached) targetUrls = JSON.parse(cached);
            if (!targetUrls || targetUrls.length === 0) targetUrls = [...DEFAULT_URLS];
        } catch(e) {
            targetUrls = [...DEFAULT_URLS];
        }
        portraitToggle.checked = localStorage.getItem('matrixIsPortrait') === 'true';
        renderInputRows();

        const cachedFolders = localStorage.getItem('matrixParsedFolders');
        if (cachedFolders) {
            parsedFoldersMap = JSON.parse(cachedFolders);
            const savedFolder = localStorage.getItem('matrixSelectedFolderId');
            if (savedFolder && parsedFoldersMap[savedFolder]) {
                searchInput.value = `${savedFolder} (${parsedFoldersMap[savedFolder].length} links)`;
                activeFolderLinks = parsedFoldersMap[savedFolder];
            }
            uploadStatus.textContent = "Active link directories loaded from storage.";
            renderVisualDatabaseManager();
        }
        setupSearchEngine();
    }

    fileInput.onchange = async (e) => {
        const files = e.target.files;
        if (!files || files.length === 0) return;

        let totalFilesProcessed = 0;
        for (let file of files) {
            const text = await file.text();
            const cleanFileName = file.name.replace(/\.[^/.]+$/, "");
            
            if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
                const hasFolders = text.includes('<H3') || text.includes('<h3');
                if (hasFolders) {
                    parseBookmarkHTML(text);
                } else {
                    extractLinksViaRegex(text, `Page: ${cleanFileName}`);
                }
            } else {
                extractLinksViaRegex(text, `List: ${cleanFileName}`);
            }
            totalFilesProcessed++;
        }

        saveDatabaseState();
        uploadStatus.textContent = `Processed and indexed ${totalFilesProcessed} list resource streams!`;
        
        searchInput.value = '';
        activeFolderLinks = [];
        localStorage.removeItem('matrixSelectedFolderId');
    };

    function parseBookmarkHTML(htmlContent) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, 'text/html');
        const headers = doc.querySelectorAll('h3');

        headers.forEach(h3 => {
            const folderName = h3.textContent.trim() || 'Unnamed Folder';
            if (!parsedFoldersMap[folderName]) parsedFoldersMap[folderName] = [];
            
            let nextEl = h3.nextElementSibling;
            while (nextEl && nextEl.tagName !== 'DL' && nextEl.tagName !== 'H3') {
                nextEl = nextEl.nextElementSibling;
            }
            
            if (nextEl && nextEl.tagName === 'DL') {
                const links = nextEl.querySelectorAll('a');
                links.forEach(a => {
                    let href = a.href;
                    if (href && !href.startsWith('place:')) {
                        href = cleanGoogleRedirect(href);
                        if (!parsedFoldersMap[folderName].includes(href)) parsedFoldersMap[folderName].push(href);
                    }
                });
            }
            if (parsedFoldersMap[folderName].length === 0) delete parsedFoldersMap[folderName];
        });
    }

    function extractLinksViaRegex(rawText, folderTitle) {
        const urlRegex = /https?:\/\/[^\s"'><\]\[,)\(\\]+/g;
        const matches = rawText.match(urlRegex) || [];
        
        if (matches.length > 0) {
            if (!parsedFoldersMap[folderTitle]) parsedFoldersMap[folderTitle] = [];
            
            matches.forEach(url => {
                let cleanUrl = cleanGoogleRedirect(url);
                if (cleanUrl.endsWith('.') || cleanUrl.endsWith(';')) cleanUrl = cleanUrl.slice(0, -1);
                
                if (!parsedFoldersMap[folderTitle].includes(cleanUrl)) {
                    parsedFoldersMap[folderTitle].push(cleanUrl);
                }
            });
            
            if (parsedFoldersMap[folderTitle].length === 0) delete parsedFoldersMap[folderTitle];
        }
    }

    function cleanGoogleRedirect(url) {
        if (url.includes('google.com/url?q=')) {
            const parts = url.split('url?q=')[1];
            if (parts) return decodeURIComponent(parts.split('&')[0]);
        }
        return url;
    }

    function renderVisualDatabaseManager() {
        const folders = Object.keys(parsedFoldersMap).sort();
        if (folders.length === 0) {
            dbEditorPanel.style.display = 'none';
            return;
        }

        dbEditorList.innerHTML = '';
        folders.forEach(folderName => {
            const count = parsedFoldersMap[folderName].length;
            const row = document.createElement('div');
            row.className = 'db-folder-row';
            row.innerHTML = `
                <span class="db-folder-name">📁 <strong>${folderName}</strong> (${count} links)</span>
                <button class="btn-inline-delete" title="Delete Folder">✕ Delete</button>
            `;

            row.querySelector('.btn-inline-delete').onclick = () => {
                delete parsedFoldersMap[folderName];
                const savedFolder = localStorage.getItem('matrixSelectedFolderId');
                if (savedFolder === folderName) {
                    searchInput.value = '';
                    activeFolderLinks = [];
                    localStorage.removeItem('matrixSelectedFolderId');
                }
                saveDatabaseState();
            };
            dbEditorList.appendChild(row);
        });

        dbEditorPanel.style.display = 'block';
    }

    function saveDatabaseState() {
        localStorage.setItem('matrixParsedFolders', JSON.stringify(parsedFoldersMap));
        renderVisualDatabaseManager();
    }

    // THE EXPORT ENGINE SYSTEM
    document.getElementById('export-cleaned-btn').onclick = () => {
        const folders = Object.keys(parsedFoldersMap);
        if (folders.length === 0) {
            alert('Your active data engine is currently empty.');
            return;
        }

        // Reconstruct a standard Netscape HTML Bookmark spec structure
        let htmlOutput = `<!DOCTYPE NETSCAPE-Bookmark-file-1>\n\n<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">\n<TITLE>Bookmarks</TITLE>\n<H1>Bookmarks</H1>\n<DL><p>\n`;

        folders.sort().forEach(folderName => {
            htmlOutput += `    <DT><H3>${escapeHtml(folderName)}</H3>\n    <DL><p>\n`;
            parsedFoldersMap[folderName].forEach(url => {
                htmlOutput += `        <DT><A HREF="${escapeHtml(url)}">${escapeHtml(url)}</A>\n`;
            });
            htmlOutput += `    </DL><p>\n`;
        });

        htmlOutput += `</DL><p>\n`;

        // Trigger safe file download container stream on ChromeOS
        const blob = new Blob([htmlOutput], { type: 'text/html;charset=utf-8' });
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = 'cleaned_bookmarks.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(downloadUrl);
    };

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function setupSearchEngine() {
        searchInput.onfocus = () => { renderSearchSuggestions(searchInput.value); };
        searchInput.oninput = () => { renderSearchSuggestions(searchInput.value); };
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrapper')) searchDropdown.style.display = 'none';
        });
    }

    function renderSearchSuggestions(query = '') {
        const folders = Object.keys(parsedFoldersMap);
        if (folders.length === 0) {
            searchDropdown.innerHTML = '<div class="search-no-results">Upload files below first...</div>';
            searchDropdown.style.display = 'block';
            return;
        }

        const normalizedQuery = query.toLowerCase().split(' (')[0].trim();
        const filtered = folders.filter(f => f.toLowerCase().includes(normalizedQuery)).sort();

        searchDropdown.innerHTML = '';
        
        if (filtered.length === 0) {
            searchDropdown.innerHTML = '<div class="search-no-results">No folders match search</div>';
        } else {
            filtered.forEach(folderName => {
                const count = parsedFoldersMap[folderName].length;
                const item = document.createElement('div');
                item.className = 'search-item';
                item.textContent = `${folderName} (${count} links)`;
                
                item.onclick = () => {
                    searchInput.value = `${folderName} (${count} links)`;
                    activeFolderLinks = parsedFoldersMap[folderName];
                    localStorage.setItem('matrixSelectedFolderId', folderName);
                    searchDropdown.style.display = 'none';
                };
                searchDropdown.appendChild(item);
            });
        }
        searchDropdown.style.display = 'block';
    }

    function getRandomUrl() {
        if (activeFolderLinks.length === 0) return '';
        return activeFolderLinks[Math.floor(Math.random() * activeFolderLinks.length)];
    }

    document.getElementById('roll-empty-btn').onclick = () => {
        saveInputsToState();
        if (activeFolderLinks.length === 0) {
            alert('Please search and select an active directory pool from the input bar first!');
            return;
        }
        let changesMade = false;
        targetUrls = targetUrls.map(url => {
            if (!url || url.trim() === '' || url === 'https://example.com') {
                changesMade = true;
                return getRandomUrl();
            }
            return url;
        });
        if (changesMade) renderInputRows();
    };

    function renderInputRows() {
        container.innerHTML = '';
        targetUrls.forEach((url, idx) => {
            const row = document.createElement('div');
            row.className = 'url-row';
            row.innerHTML = `
                <input type="text" class="url-input" value="${url}" placeholder="Paste URL..." data-idx="${idx}">
                <button class="btn btn-remove" onclick="removeRow(${idx})">✕</button>
            `;
            container.appendChild(row);
        });
    }

    function saveInputsToState() {
        const inputs = document.querySelectorAll('.url-input');
        targetUrls = [];
        inputs.forEach(input => targetUrls.push(input.value.trim()));
        localStorage.setItem('loop_matrix_urls', JSON.stringify(targetUrls));
        localStorage.setItem('matrixIsPortrait', portraitToggle.checked);
    }

    document.getElementById('add-field-btn').onclick = () => {
        saveInputsToState();
        targetUrls.push('');
        renderInputRows();
    };

    window.removeRow = (idx) => {
        saveInputsToState();
        targetUrls.splice(idx, 1);
        if (targetUrls.length === 0) targetUrls = [''];
        renderInputRows();
    };

    document.getElementById('clear-cache-btn').onclick = () => {
        if (confirm('Wipe layout configurations and imported link databases?')) {
            localStorage.clear();
            targetUrls = [...DEFAULT_URLS];
            parsedFoldersMap = {};
            activeFolderLinks = [];
            portraitToggle.checked = false;
            searchInput.value = '';
            uploadStatus.textContent = '';
            renderInputRows();
            renderVisualDatabaseManager();
        }
    };

    document.getElementById('launch-btn').onclick = () => {
        saveInputsToState();
        const activeTargets = targetUrls.filter(url => url.length > 0 && url !== 'https://example.com');
        if (activeTargets.length === 0) {
            alert('Please provide or shuffle in at least one valid stream target.');
            return;
        }
        launchMatrix(targetUrls);
    };

    function launchMatrix(urls) {
        setupScreen.style.display = 'none';
        loopScreen.style.display = 'block';
        feedContainer.innerHTML = '';
        
        const isPortraitMode = portraitToggle.checked;
        const panelClass = isPortraitMode ? 'stream-panel mode-portrait' : 'stream-panel mode-landscape';
        
        urls.forEach((url, index) => {
            if (!url) return; 
            
            const panel = document.createElement('div');
            panel.className = panelClass;
            panel.setAttribute('data-panel-idx', index);
            
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.className = 'post-iframe';
            iframe.allow = 'autoplay; fullscreen';
            iframe.loading = index > 1 ? 'lazy' : 'eager';
            iframe.sandbox = 'allow-same-origin allow-scripts allow-forms allow-popups';
            
            const overlay = document.createElement('div');
            overlay.className = 'hotswap-overlay';
            overlay.innerHTML = `
                <button class="hotswap-btn dice-btn" title="Roll Random Bookmark">🎲</button>
                <input type="text" class="hotswap-input" value="${url}" placeholder="Swap URL...">
                <button class="hotswap-btn">✓</button>
            `;
            
            const diceBtn = overlay.querySelector('.dice-btn');
            const inputField = overlay.querySelector('.hotswap-input');
            const submitBtn = overlay.querySelector('.hotswap-btn:not(.dice-btn)');
            
            const processHotswap = (forcedUrl) => {
                const nextUrl = forcedUrl || inputField.value.trim();
                if (nextUrl.length > 0) {
                    iframe.src = nextUrl; 
                    inputField.value = nextUrl;
                    targetUrls[index] = nextUrl;
                    localStorage.setItem('loop_matrix_urls', JSON.stringify(targetUrls));
                }
            };
            
            diceBtn.onclick = (e) => {
                e.stopPropagation();
                const freshUrl = getRandomUrl();
                if (freshUrl) processHotswap(freshUrl);
            };

            submitBtn.onclick = (e) => { e.stopPropagation(); processHotswap(); };
            inputField.onkeydown = (e) => { if (e.key === 'Enter') { e.stopPropagation(); processHotswap(); } };
            
            panel.appendChild(iframe);
            panel.appendChild(overlay);
            feedContainer.appendChild(panel);
        });

        document.getElementById('status').textContent = `${feedContainer.children.length} active streams`;
        updateLabels();
        accurateYPosition = window.scrollY;
        window.scrollTo(0, 0);
    }

    document.getElementById('edit-config-btn').onclick = () => {
        stopScrolling();
        loopScreen.style.display = 'none';
        setupScreen.style.display = 'flex';
        initLaunchpad();
    };

    const smoothScrollLoop = () => {
        if (!isScrolling) return;
        accurateYPosition += scrollSpeed;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        if (accurateYPosition >= maxScroll - 2) {
            accurateYPosition = 0;
            window.scrollTo(0, 0);
        } else {
            window.scrollTo(0, Math.floor(accurateYPosition));
        }
        animationFrameId = requestAnimationFrame(smoothScrollLoop);
    };

    const startScrolling = () => {
        isScrolling = true;
        accurateYPosition = window.scrollY;
        const toggleBtn = document.getElementById('toggle');
        toggleBtn.textContent = '⏸ PAUSE';
        toggleBtn.className = 'pause';
        animationFrameId = requestAnimationFrame(smoothScrollLoop);
    };

    const stopScrolling = () => {
        isScrolling = false;
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        const toggleBtn = document.getElementById('toggle');
        toggleBtn.textContent = '▶ PLAY';
        toggleBtn.className = '';
    };

    function updateLabels() { document.getElementById('speed-label').textContent = `Speed: ${scrollSpeed.toFixed(2)}x`; }
    document.getElementById('toggle').onclick = () => { if (isScrolling) stopScrolling(); else startScrolling(); };

    function jumpNext() {
        const currentPosition = window.scrollY;
        const panelEl = document.querySelector('.stream-panel');
        const viewHeight = panelEl ? panelEl.offsetHeight : window.innerHeight;
        accurateYPosition = (Math.floor((currentPosition + 10) / viewHeight) + 1) * viewHeight;
        window.scrollTo({ top: accurateYPosition, behavior: 'smooth' });
    }

    function jumpPrev() {
        const currentPosition = window.scrollY;
        const panelEl = document.querySelector('.stream-panel');
        const viewHeight = panelEl ? panelEl.offsetHeight : window.innerHeight;
        accurateYPosition = Math.max(0, (Math.ceil((currentPosition - 10) / viewHeight) - 1) * viewHeight);
        window.scrollTo({ top: accurateYPosition, behavior: 'smooth' });
    }

    document.getElementById('next-page-btn').onclick = jumpNext;
    document.getElementById('prev-page-btn').onclick = jumpPrev;
    document.getElementById('faster').onclick = () => { scrollSpeed = Math.min(15, scrollSpeed + 0.05); updateLabels(); localStorage.setItem('matrixScrollSpeed', scrollSpeed); };
    document.getElementById('slower').onclick = () => { scrollSpeed = Math.max(0.05, scrollSpeed - 0.05); updateLabels(); localStorage.setItem('matrixScrollSpeed', scrollSpeed); };

    document.addEventListener('keydown', (e) => {
        if (loopScreen.style.display !== 'block' || document.activeElement.tagName === 'INPUT') return;
        switch (e.key) {
            case ' ': case 'Spacebar': e.preventDefault(); document.getElementById('toggle').click(); break;
            case 'ArrowUp': e.preventDefault(); jumpPrev(); break;
            case 'ArrowDown': e.preventDefault(); jumpNext(); break;
        }
    });

    initLaunchpad();
</script>
</body>
</html>
