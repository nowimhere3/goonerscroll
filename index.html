<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Stream Loop Launchpad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0b0b; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; overflow-x: hidden; }
        
        /* Step 1: Configuration / Launchpad Screen View */
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        }
        .config-card {
            background: #161616;
            border: 1px solid #2d2d2d;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { font-size: 24px; margin-bottom: 8px; color: #fff; text-align: center; }
        .subtitle { font-size: 13px; color: #777; text-align: center; margin-bottom: 24px; }
        
        /* Toggle Switch Styling */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 20px;
            margin-top: 20px;
        }
        .toggle-label {
            font-size: 14px;
            font-weight: bold;
            color: #ddd;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #0095f6; }
        input:checked + .slider:before { transform: translateX(24px); }

        .url-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
        .url-input {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            padding: 12px 16px;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .url-input:focus { border-color: #0095f6; }
        
        .btn {
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-add { background: #222; color: #0095f6; border: 1px solid #333; }
        .btn-add:hover { background: #2a2a2a; }
        .btn-remove { background: #331417; color: #ed4956; border: 1px solid #4a1a1e; }
        .btn-remove:hover { background: #441a1f; }
        .btn-launch { background: #0095f6; color: #fff; width: 100%; margin-top: 15px; font-size: 16px; padding: 14px; }
        .btn-launch:hover { background: #189ffa; }

        .actions-bar { display: flex; justify-content: space-between; margin-top: 15px; }

        /* Step 2: Active Automated Viewport Layer */
        #loop-screen { display: none; }
        #feed { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; }
        
        /* Dynamic Layout Architectures */
        .stream-panel {
            position: relative;
            width: 100%;
            background: #000;
            border-bottom: 2px solid #222;
            transition: height 0.2s ease;
        }
        
        .mode-landscape { height: 100vh; }
        .mode-portrait { height: 50vh; } 

        .post-iframe { width: 100%; height: 100%; border: none; display: block; }
        
        /* Hotswap Floating Input Bar (Fades in on panel hover) */
        .hotswap-overlay {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 4px 8px;
            display: flex;
            gap: 6px;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateY(-5px);
            z-index: 10000;
            backdrop-filter: blur(8px);
            width: 320px;
        }
        .stream-panel:hover .hotswap-overlay {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .hotswap-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 14px;
            padding: 4px 10px;
            color: #fff;
            font-size: 11px;
            outline: none;
        }
        .hotswap-input:focus { border-color: #0095f6; }
        .hotswap-btn {
            background: #0095f6;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hotswap-btn:hover { background: #189ffa; }

        /* Floating Control Dock */
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 10px 18px;
            border-radius: 30px;
            z-index: 2147483647;
            display: flex;
            gap: 10px;
            align-items: center;
            color: white;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        #controls button {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        #controls button#toggle { background: #0095f6; border: none; }
        #controls button#toggle.pause { background: #ed4956; }
        #controls button.nav-jump { background: #333; color: #fff; border-color: #555; }
        #controls button.btn-gear { background: #333; font-size: 14px; padding: 6px 10px; }
        #controls .info { color: #888; font-size: 13px; font-family: monospace; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="config-card">
        <h2>Stream Loop Launchpad</h2>
        <p class="subtitle">Enter the target workspace URLs to distribute down the scrolling grid pipeline.</p>
        
        <div id="url-fields-container">
            </div>

        <div class="actions-bar">
            <button class="btn btn-add" id="add-field-btn">+ Add Stream Row</button>
            <button class="btn btn-remove" id="clear-cache-btn">Reset Grid</button>
        </div>

        <button class="btn btn-launch" id="launch-btn">🚀 LAUNCH MATRIX</button>

        <div class="toggle-container">
            <span class="toggle-label">📐 Optimize Layout for Portrait Monitor</span>
            <label class="switch">
                <input type="checkbox" id="portrait-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>

<div id="loop-screen">
    <div id="feed"></div>
    <div id="controls">
        <button id="toggle">▶ PLAY</button>
        <button id="prev-page-btn" class="nav-jump">▲ UP</button>
        <button id="next-page-btn" class="nav-jump">▼ DN</button>
        <span class="info" id="status">0 streams</span>
        <span class="info">|</span>
        <button id="faster">+</button>
        <span class="info" id="speed-label">Speed: 1.00x</span>
        <button id="slower">-</button>
        <span class="info">|</span>
        <button class="btn-gear" id="edit-config-btn">⚙️</button>
    </div>
</div>

<script>
    let animationFrameId = null;
    let isScrolling = false;
    let scrollSpeed = parseFloat(localStorage.getItem('matrixScrollSpeed')) || 1.00;
    let targetUrls = [];
    
    let accurateYPosition = 0; 

    const DEFAULT_URLS = [
        'https://example.com',
        'https://example.com',
        'https://example.com'
    ];

    const setupScreen = document.getElementById('setup-screen');
    const loopScreen = document.getElementById('loop-screen');
    const feedContainer = document.getElementById('feed');
    const container = document.getElementById('url-fields-container');
    const portraitToggle = document.getElementById('portrait-mode-toggle');

    function initLaunchpad() {
        const cached = localStorage.getItem('loop_matrix_urls');
        if (cached) {
            targetUrls = JSON.parse(cached);
        } else {
            targetUrls = [...DEFAULT_URLS];
        }

        const savedPortraitState = localStorage.getItem('matrixIsPortrait') === 'true';
        portraitToggle.checked = savedPortraitState;

        renderInputRows();
    }

    function renderInputRows() {
        container.innerHTML = '';
        targetUrls.forEach((url, idx) => {
            const row = document.createElement('div');
            row.className = 'url-row';
            row.innerHTML = `
                <input type="text" class="url-input" value="${url}" placeholder="https://..." data-idx="${idx}">
                <button class="btn btn-remove" onclick="removeRow(${idx})">✕</button>
            `;
            container.appendChild(row);
        });
    }

    function saveInputsToState() {
        const inputs = document.querySelectorAll('.url-input');
        inputs.forEach(input => {
            const idx = parseInt(input.getAttribute('data-idx'));
            targetUrls[idx] = input.value.trim();
        });
        localStorage.setItem('matrixIsPortrait', portraitToggle.checked);
    }

    document.getElementById('add-field-btn').onclick = () => {
        saveInputsToState();
        targetUrls.push('');
        renderInputRows();
    };

    window.removeRow = (idx) => {
        saveInputsToState();
        targetUrls.splice(idx, 1);
        renderInputRows();
    };

    document.getElementById('clear-cache-btn').onclick = () => {
        if (confirm('Clear current workspace configurations?')) {
            localStorage.removeItem('loop_matrix_urls');
            localStorage.removeItem('matrixIsPortrait');
            targetUrls = [...DEFAULT_URLS];
            portraitToggle.checked = false;
            renderInputRows();
        }
    };

    document.getElementById('launch-btn').onclick = () => {
        saveInputsToState();
        const activeTargets = targetUrls.filter(url => url.length > 0);
        if (activeTargets.length === 0) {
            alert('Please provide at least one valid stream destination.');
            return;
        }
        localStorage.setItem('loop_matrix_urls', JSON.stringify(activeTargets));
        launchMatrix(activeTargets);
    };

    function launchMatrix(urls) {
        setupScreen.style.display = 'none';
        loopScreen.style.display = 'block';
        
        feedContainer.innerHTML = '';
        targetUrls = [...urls]; 
        
        const isPortraitMode = portraitToggle.checked;
        const panelClass = isPortraitMode ? 'stream-panel mode-portrait' : 'stream-panel mode-landscape';
        
        urls.forEach((url, index) => {
            const panel = document.createElement('div');
            panel.className = panelClass;
            panel.setAttribute('data-panel-idx', index);
            
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.className = 'post-iframe';
            iframe.allow = 'autoplay; fullscreen';
            iframe.loading = index > 1 ? 'lazy' : 'eager';
            iframe.sandbox = 'allow-same-origin allow-scripts allow-forms allow-popups';
            
            const overlay = document.createElement('div');
            overlay.className = 'hotswap-overlay';
            overlay.innerHTML = `
                <input type="text" class="hotswap-input" value="${url}" placeholder="Swap URL...">
                <button class="hotswap-btn">✓</button>
            `;
            
            const inputField = overlay.querySelector('.hotswap-input');
            const submitBtn = overlay.querySelector('.hotswap-btn');
            
            const processHotswap = () => {
                const newUrl = inputField.value.trim();
                if (newUrl.length > 0) {
                    iframe.src = newUrl;
                    targetUrls[index] = newUrl;
                    localStorage.setItem('loop_matrix_urls', JSON.stringify(targetUrls));
                }
            };
            
            submitBtn.onclick = (e) => { e.stopPropagation(); processHotswap(); };
            inputField.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.stopPropagation();
                    processHotswap();
                }
            };
            
            panel.appendChild(iframe);
            panel.appendChild(overlay);
            feedContainer.appendChild(panel);
        });

        document.getElementById('status').textContent = `${urls.length} streams`;
        updateLabels();
        
        accurateYPosition = window.scrollY;
        window.scrollTo(0, 0);
    }

    document.getElementById('edit-config-btn').onclick = () => {
        stopScrolling();
        loopScreen.style.display = 'none';
        setupScreen.style.display = 'flex';
        initLaunchpad();
    };

    const smoothScrollLoop = () => {
        if (!isScrolling) return;

        accurateYPosition += scrollSpeed;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

        if (accurateYPosition >= maxScroll - 2) {
            accurateYPosition = 0;
            window.scrollTo(0, 0);
        } else {
            window.scrollTo(0, Math.floor(accurateYPosition));
        }

        animationFrameId = requestAnimationFrame(smoothScrollLoop);
    };

    const startScrolling = () => {
        isScrolling = true;
        accurateYPosition = window.scrollY;
        
        const toggleBtn = document.getElementById('toggle');
        toggleBtn.textContent = '⏸ PAUSE';
        toggleBtn.className = 'pause';
        animationFrameId = requestAnimationFrame(smoothScrollLoop);
    };

    const stopScrolling = () => {
        isScrolling = false;
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        const toggleBtn = document.getElementById('toggle');
        toggleBtn.textContent = '▶ PLAY';
        toggleBtn.className = '';
    };

    function updateLabels() {
        document.getElementById('speed-label').textContent = `Speed: ${scrollSpeed.toFixed(2)}x`;
    }

    document.getElementById('toggle').onclick = () => {
        if (isScrolling) stopScrolling(); else startScrolling();
    };

    function jumpNext() {
        const currentPosition = window.scrollY;
        const panelEl = document.querySelector('.stream-panel');
        const viewHeight = panelEl ? panelEl.offsetHeight : window.innerHeight;
        const nextTarget = Math.floor((currentPosition + 10) / viewHeight) + 1;
        accurateYPosition = nextTarget * viewHeight;
        window.scrollTo({
            top: accurateYPosition,
            behavior: 'smooth'
        });
    }

    function jumpPrev() {
        const currentPosition = window.scrollY;
        const panelEl = document.querySelector('.stream-panel');
        const viewHeight = panelEl ? panelEl.offsetHeight : window.innerHeight;
        const prevTarget = Math.ceil((currentPosition - 10) / viewHeight) - 1;
        accurateYPosition = Math.max(0, prevTarget * viewHeight);
        window.scrollTo({
            top: accurateYPosition,
            behavior: 'smooth'
        });
    }

    document.getElementById('next-page-btn').onclick = jumpNext;
    document.getElementById('prev-page-btn').onclick = jumpPrev;

    function increaseSpeed() {
        scrollSpeed = Math.min(15, scrollSpeed + 0.05);
        updateLabels();
        localStorage.setItem('matrixScrollSpeed', scrollSpeed);
    }

    function decreaseSpeed() {
        scrollSpeed = Math.max(0.05, scrollSpeed - 0.05);
        updateLabels();
        localStorage.setItem('matrixScrollSpeed', scrollSpeed);
    }

    document.getElementById('faster').onclick = increaseSpeed;
    document.getElementById('slower').onclick = decreaseSpeed;

    document.addEventListener('keydown', (e) => {
        if (loopScreen.style.display !== 'block') return;
        if (document.activeElement.tagName === 'INPUT') return;

        switch (e.key) {
            case ' ':
            case 'Spacebar':
                e.preventDefault();
                document.getElementById('toggle').click();
                break;
            case 'ArrowUp':
                e.preventDefault();
                jumpPrev();
                break;
            case 'ArrowDown':
                e.preventDefault();
                jumpNext();
                break;
            case 'ArrowLeft':
                e.preventDefault();
                decreaseSpeed();
                break;
            case 'ArrowRight':
                e.preventDefault();
                increaseSpeed();
                break;
        }
    });

    initLaunchpad();
</script>
</body>
</html>
