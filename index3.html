<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple Screen Mode - Goonerscroll</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            background: #0b0b0b;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
        }

        #top-controls {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 20000;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 10px;
            backdrop-filter: blur(8px);
        }

        #top-controls input,
        #top-controls select,
        #top-controls button,
        #top-controls a {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #eee;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            text-decoration: none;
        }

        #top-controls button { cursor: pointer; font-weight: 700; }
        #top-controls button:hover { border-color: #0095f6; }
        #status { color: #888; font-family: monospace; font-size: 12px; margin-left: auto; }

        #triple-layout {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            grid-template-areas:
                "screen1 screen2"
                "screen1 screen3";
        }

        .stream-slot {
            position: relative;
            border: 1px solid #1d1d1d;
            overflow: hidden;
            background: #000;
        }

        #screen-1-slot { grid-area: screen1; }
        #screen-2-slot { grid-area: screen2; }
        #screen-3-slot { grid-area: screen3; }

        .slot-label {
            position: absolute;
            left: 8px;
            top: 8px;
            z-index: 9998;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            color: #999;
            border-radius: 8px;
            font-size: 11px;
            padding: 3px 8px;
            letter-spacing: 0.5px;
        }

        .stream-panel {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .triple-fill { height: 100% !important; }

        /* Iframe zoom wrapper — sits between panel and iframe */
        .iframe-zoom-wrapper {
            width: 100%;
            height: 100%;
            transform-origin: center center;
            transition: transform 0.2s ease;
        }

        .post-iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Hotswap trigger button — always visible at top-right */
        .hotswap-trigger {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #555;
            border-radius: 12px;
            color: #ccc;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            padding: 8px 18px;
            z-index: 10001;
            backdrop-filter: blur(6px);
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            user-select: none;
        }
        .hotswap-trigger:hover { background: rgba(0,0,0,0.95); color: #fff; border-color: #888; }
        .hotswap-trigger.open { background: rgba(0,95,200,0.85); border-color: #0095f6; color: #fff; }

        /* Expanded hotswap overlay — drops down from trigger */
        .hotswap-overlay {
            position: absolute;
            top: 70px;
            right: 16px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
            z-index: 10000;
            backdrop-filter: blur(10px);
            min-width: 220px;
            max-width: 280px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-12px) scale(0.95);
            transform-origin: top right;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }
        .hotswap-overlay.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        /* Zoom controls row inside overlay */
        .zoom-control-row {
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }

        .btn-zoom {
            background: #1a1a2a;
            border: 1px solid #3a3a6a;
            color: #aac;
            border-radius: 8px;
            width: 26px;
            height: 26px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .btn-zoom:hover { background: #2a2a4a; color: #fff; }

        .zoom-label {
            font-size: 10px;
            color: #666;
            font-family: monospace;
            min-width: 36px;
            text-align: center;
        }

        /* Icon button row */
        .hotswap-icon-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

        .btn-hotswap-toggle,
        .btn-hotswap-kill,
        .btn-hotswap-star,
        .btn-hotswap-reload {
            border-radius: 10px;
            width: 28px;
            height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-hotswap-toggle { background: #222; border: 1px solid #444; color: #aaa; }
        .btn-hotswap-toggle:hover { background: #333; color: #fff; }
        .btn-hotswap-toggle.active { background: #0095f6; border-color: #0095f6; color: #fff; }

        .btn-hotswap-shuffle {
            background: #1a2a1a;
            border: 1px solid #3a6b3a;
            color: #4caf50;
            border-radius: 10px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            flex: 1;
            transition: background 0.15s;
        }
        .btn-hotswap-shuffle:hover { background: #223322; }

        .btn-hotswap-shuffle-all {
            background: #1a2634;
            border: 1px solid #2d4f73;
            color: #6eb4f1;
            border-radius: 10px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .btn-hotswap-shuffle-all:hover { background: #24364a; }

        .btn-purge {
            background: #331417;
            color: #ed4956;
            border: 1px solid #4a1a1e;
            border-radius: 10px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            flex: 1;
            transition: background 0.15s;
        }
        .btn-purge:hover { background: #ed4956; color: #fff; }

        .btn-hotswap-delete {
            background: #1a1a1a;
            border: 1px solid #555;
            color: #ccc;
            border-radius: 10px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .btn-hotswap-delete:hover { background: #333; color: #fff; }

        .btn-hotswap-kill { background: #1a0808; border: 1px solid #5a2020; color: #888; }
        .btn-hotswap-kill:hover { background: #3a0a0a; color: #ed4956; }

        .btn-hotswap-star { background: #1a1a0a; border: 1px solid #5a5a00; color: #f0c040; transition: background 0.15s, transform 0.15s; }
        .btn-hotswap-star:hover { background: #2a2a00; transform: scale(1.15); }
        .btn-hotswap-star.saved { color: #ffd700; background: #2a2200; border-color: #ffd700; }

        .btn-hotswap-reload { background: #0a1a2a; border: 1px solid #1a5a8a; color: #4a9fd4; transition: transform 0.3s; }
        .btn-hotswap-reload:hover { background: #0d2a3a; }
        .btn-hotswap-reload.spinning { transform: rotate(360deg); transition: transform 0.4s ease; }

        .hotswap-url-row { display: none; gap: 5px; align-items: center; padding-top: 4px; }
        .hotswap-url-row.open { display: flex; }
        .hotswap-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 14px;
            padding: 6px 10px;
            color: #fff;
            font-size: 11px;
            outline: none;
            min-width: 140px;
        }
        .hotswap-input:focus { border-color: #0095f6; }
        .hotswap-submit-btn {
            background: #0095f6;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hotswap-submit-btn:hover { background: #19a4f9; }

        #bookmark-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2147483647;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
        }
        #bookmark-modal.open { display: flex; }
        .bookmark-card {
            background: #161616;
            border: 1px solid #2d2d2d;
            border-radius: 16px;
            padding: 24px;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        .bookmark-card h3 { font-size: 18px; margin-bottom: 16px; }
        .bm-url-preview {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #aaa;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
        }
        .bookmark-card label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: bold;
            margin-top: 12px;
        }
        .bm-folder-select,
        .bm-new-folder-input {
            width: 100%;
            background: #222;
            border: 1px solid #333;
            padding: 10px 12px;
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            outline: none;
        }
        .bm-folder-select:focus,
        .bm-new-folder-input:focus {
            border-color: #0095f6;
        }
        .bm-actions { display: flex; gap: 10px; margin-top: 20px; }
        .bm-actions button {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .btn-bm-cancel { background: #2a2a2a; color: #aaa; }
        .btn-bm-cancel:hover { background: #3a3a3a; }
        .btn-bm-save { background: #7c4dff; color: #fff; }
        .btn-bm-save:hover { background: #9d6dff; }

        @media (max-width: 900px) {
            body { overflow: auto; }
            #top-controls { position: sticky; top: 0; border-radius: 0; left: 0; right: 0; }
            #status { width: 100%; margin-left: 0; }
            #triple-layout {
                height: auto;
                min-height: calc(100vh - 72px);
                grid-template-columns: 1fr;
                grid-template-rows: minmax(38vh, 1fr) minmax(30vh, 1fr) minmax(30vh, 1fr);
                grid-template-areas:
                    "screen1"
                    "screen2"
                    "screen3";
            }
        }
    </style>
</head>
<body>
    <div id="top-controls">
        <a href="index.html" title="Back to launchpad">⚙ Back</a>
        <input type="password" id="git-token" placeholder="GitHub PAT">
        <input type="text" id="git-repo" placeholder="owner/repo">
        <button id="btn-connect-git">⚡ Connect</button>
        <select id="triple-folder-select">
            <option value="">Any Folder (global random)</option>
        </select>
        <button id="btn-load-triple">🎲 Load Folder</button>
        <button id="btn-shuffle-triple-all">🎲🎲 Shuffle All</button>
        <span id="status">Loading…</span>
    </div>

    <div id="triple-layout">
        <div id="screen-1-slot" class="stream-slot"><span class="slot-label">Screen 1</span></div>
        <div id="screen-2-slot" class="stream-slot"><span class="slot-label">Screen 2</span></div>
        <div id="screen-3-slot" class="stream-slot"><span class="slot-label">Screen 3</span></div>
    </div>

    <div id="bookmark-modal">
        <div class="bookmark-card">
            <h3>⭐ Save to Playlist</h3>
            <div class="bm-url-preview" id="bm-url-preview"></div>

            <label>Choose existing folder</label>
            <select class="bm-folder-select" id="bm-folder-select">
                <option value="">— select a folder —</option>
            </select>

            <label>Or create a new folder</label>
            <input type="text" class="bm-new-folder-input" id="bm-new-folder-input" placeholder="New playlist name...">

            <div class="bm-actions">
                <button class="btn-bm-cancel" id="btn-bm-cancel">Cancel</button>
                <button class="btn-bm-save" id="btn-bm-save">⭐ Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/triple-mode.js"></script>
</body>
</html>
